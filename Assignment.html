<!-- Async Weather Tracker -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0b0b14, #141427);
            background-attachment: fixed;
            min-height: 100vh;
            color: #151313;
            padding: 40px 20px;
        }

        #head {
            text-align: center;
            color: #00f5d4;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .parent-card {
            display: flex;
            gap: 30px;
        }

        /* Glassmorphism Card Style */
        .card {
            background: rgba(63, 37, 37, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h3 {
            margin-bottom: 20px;
            font-weight: 500;
            color: #83cae6;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            background: rgba(185, 185, 185, 0.9);
            color: #171616;
            font-size: 1rem;
        }

        button#searchBtn {
            background: #F16D34;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
        }

        button#searchBtn:hover {
            background: #ff7e45;
            transform: translateY(-2px);
        }

        /* Weather Items - Fixed Visibility */
        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.08);
            /* Darker background for contrast */
            border-left: 5px solid #00f5d4;
            transition: background 0.3s;
        }

        .weather-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .weather-item label {
            font-weight: 600;
            color: #00f5d4;
        }

        .weather-item span {
            color: #0e0d0d;
            font-weight: 400;
        }

        /* History Buttons */
        .history button {
            background: rgba(187, 224, 239, 0.2);
            border: 1px solid #111111;
            color: #6ccaef;
            margin: 5px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .history button:hover {
            background: #0e0e0e;
            color: #141e30;
        }

        @media (max-width:768px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>

</head>

<body>
    <div class="container">

        <h1 id="head">🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

    <script>
        const API_KEY = "9bdca10ecca58460823b65ac21d070b2";
        //    const API_KEY = "af9f63c59a649f27d602b96a43d0bd14";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {

            // small delay for smoother UI
            // await new Promise(r => setTimeout(r, 500));

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("city not found");
                throw new Error("City not found");
            }
            const data = await res.json();
            return data;
        }

        /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

        /* ---------- SAVE SEARCH HISTORY ---------- */
        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            // Remove the city if it already exists (to avoid duplicates)
            history = history.filter(item => item.toLowerCase() !== city.toLowerCase());

            // Add the new city to the beginning
            history.unshift(city);

            // Keep only the last 5 searches
            history = history.slice(0, 5);

            // FIX: Save the updated array back to localStorage as a string
            localStorage.setItem("weatherHistory", JSON.stringify(history));

            showHistory();
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            // Clear the current display
            historyBox.innerHTML = "";

            // Get history from localStorage
            const history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            // Create a button for each city in the history
            history.forEach(city => {
                const btn = document.createElement("button");
                btn.textContent = city;

                // When clicked, search for that city again
                btn.onclick = () => {
                    cityInput.value = city; // Optional: put city name back in input
                    search(city);
                };

                historyBox.appendChild(btn);
            });
        }
        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }

        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });
        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
